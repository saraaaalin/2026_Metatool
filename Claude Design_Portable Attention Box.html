<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portable Attention Box — UI Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'IBM Plex Mono', monospace; }

  /* ── DESIGN TOKENS ── */
  :root {
    --ink: #0c0c0c;
    --paper: #f8f7f5;
    --paper2: #efefed;
    --gray1: #d8d6d2;
    --gray2: #a8a6a1;
    --gray3: #6b6966;
    --accent: #0c0c0c;
    --grid: rgba(12,12,12,0.07);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  /* ── SHARED PHONE SHELL ── */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
    font-family: var(--mono);
    color: var(--ink);
  }

  /* Grid background */
  .phone::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .screen-content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 6px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--gray3);
    font-family: var(--mono);
  }
  .status-bar .time { font-weight: 500; font-size: 12px; color: var(--ink); }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .signal-bar { display: flex; gap: 2px; align-items: flex-end; }
  .signal-bar span { background: var(--ink); width: 3px; border-radius: 1px; }

  /* Nav bar */
  .nav-bar {
    display: flex; align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--gray1);
    gap: 12px;
  }
  .nav-bar .back-btn {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--gray3); text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
  }
  .nav-bar .screen-title {
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gray3);
    margin-left: auto; margin-right: auto;
  }

  /* ── HALFTONE GENERATOR ── */
  .halftone-bg {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    padding: 14px 20px;
    background: var(--ink);
    color: var(--paper);
    border: none; cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--gray1); cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── LABELS ── */
  .field-label {
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--gray3);
    margin-bottom: 6px;
  }
  .field-value {
    font-size: 12px; color: var(--ink);
    font-family: var(--mono);
  }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--gray1); margin: 0 20px; }

  /* ── SECTION BLOCK ── */
  .section { padding: 18px 20px; }

  /* ── SLIDER ── */
  .focus-slider-track {
    height: 2px; background: var(--gray1);
    position: relative; margin: 10px 0;
  }
  .focus-slider-fill {
    height: 2px; background: var(--ink);
    position: absolute; left: 0; top: 0;
  }
  .focus-slider-thumb {
    width: 12px; height: 12px;
    background: var(--ink);
    border-radius: 50%;
    position: absolute; top: -5px;
    transform: translateX(-50%);
  }
  .slider-labels {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--gray3); letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* ── LIGHTING CHIPS ── */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 10px;
    border: 1px solid var(--gray1);
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gray3); cursor: pointer; background: transparent;
    font-family: var(--mono);
  }
  .chip.active {
    border-color: var(--ink); color: var(--ink);
    background: rgba(12,12,12,0.05);
  }

  /* ── TEXT INPUT ── */
  .text-input {
    width: 100%;
    border: none; border-bottom: 1px solid var(--gray1);
    background: transparent;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink);
    padding: 6px 0;
    outline: none;
  }
  .text-input::placeholder { color: var(--gray2); font-size: 11px; }

  /* ── NOTES AREA ── */
  .notes-area {
    width: 100%;
    border: 1px solid var(--gray1);
    background: transparent;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink);
    padding: 10px;
    outline: none; resize: none;
    min-height: 64px;
  }
  .notes-area::placeholder { color: var(--gray2); }

  /* ── ARCHIVE CARDS ── */
  .archive-card {
    border: 1px solid var(--gray1);
    padding: 12px;
    display: grid;
    grid-template-columns: 56px 56px 1fr;
    gap: 10px;
    align-items: start;
    background: var(--paper);
    margin: 0 20px;
  }
  .thumb-box {
    width: 56px; height: 56px;
    background: var(--paper2);
    border: 1px solid var(--gray1);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .archive-meta { font-size: 9px; color: var(--gray3); line-height: 1.8; letter-spacing: 0.06em; }
  .archive-meta .date { font-size: 10px; color: var(--ink); font-weight: 500; margin-bottom: 2px; }
  .focus-pill {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid var(--ink);
    font-size: 8px; letter-spacing: 0.1em;
    color: var(--ink);
  }

  /* ── RECALL RESULT CARDS ── */
  .recall-card {
    border: 1px solid var(--gray1);
    margin: 0 20px;
    padding: 14px;
    background: var(--paper);
  }
  .recall-match-bar {
    height: 2px; background: var(--gray1);
    position: relative; margin: 8px 0 4px;
  }
  .recall-match-fill { height: 2px; background: var(--ink); position: absolute; left: 0; top: 0; }

  /* ── DETAIL SCREEN ── */
  .detail-stat {
    display: flex; flex-direction: column; gap: 2px;
    border-left: 2px solid var(--ink);
    padding-left: 10px;
  }
  .detail-stat .s-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray3); }
  .detail-stat .s-value { font-size: 13px; color: var(--ink); }

  /* ── PROCESSING SCREEN ── */
  .processing-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; font-size: 10px; letter-spacing: 0.06em;
  }
  .processing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink); flex-shrink: 0;
  }
  .processing-dot.done { background: var(--ink); }
  .processing-dot.active { background: var(--gray2); animation: pulse 1.2s infinite; }
  .processing-dot.waiting { background: var(--gray1); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>

/* Point cloud SVG */
const PointCloud = ({ width, height, density = 120, style = {} }) => {
  const pts = React.useMemo(() => {
    const r = [];
    // cluster points with some Gaussian-ish distribution
    const cx = width * 0.5, cy = height * 0.45;
    for (let i = 0; i < density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spread = Math.random();
      const radius = Math.pow(spread, 0.5) * Math.min(width, height) * 0.44;
      const x = cx + Math.cos(angle) * radius * (0.5 + Math.random() * 0.5);
      const y = cy + Math.sin(angle) * radius * 0.65;
      const s = 0.8 + Math.random() * 2.2;
      const o = 0.15 + Math.random() * 0.75;
      r.push({ x, y, s, o });
    }
    // add some object cluster groups
    [[0.28,0.38],[0.55,0.32],[0.72,0.5],[0.38,0.62],[0.6,0.65]].forEach(([fx,fy]) => {
      for (let j = 0; j < 12; j++) {
        r.push({
          x: fx * width + (Math.random()-0.5)*28,
          y: fy * height + (Math.random()-0.5)*20,
          s: 1 + Math.random() * 2.5,
          o: 0.4 + Math.random() * 0.55
        });
      }
    });
    return r;
  }, [width, height, density]);

  return (
    <svg width={width} height={height} style={style}>
      {/* Grid mesh */}
      {Array.from({length: Math.floor(height/20)+1}, (_,i) => (
        <line key={`h${i}`} x1={0} y1={i*20} x2={width} y2={i*20}
          stroke="rgba(12,12,12,0.06)" strokeWidth="0.5"/>
      ))}
      {Array.from({length: Math.floor(width/20)+1}, (_,i) => (
        <line key={`v${i}`} x1={i*20} y1={0} x2={i*20} y2={height}
          stroke="rgba(12,12,12,0.06)" strokeWidth="0.5"/>
      ))}
      {/* Connecting lines between nearby points */}
      {pts.slice(0,40).map((p,i) => pts.slice(i+1,i+3).map((q,j) => {
        const dist = Math.hypot(q.x-p.x, q.y-p.y);
        return dist < 55 ? (
          <line key={`l${i}-${j}`} x1={p.x} y1={p.y} x2={q.x} y2={q.y}
            stroke="rgba(12,12,12,0.1)" strokeWidth="0.5"/>
        ) : null;
      }))}
      {/* Points */}
      {pts.map((p,i) => (
        <circle key={i} cx={p.x} cy={p.y} r={p.s}
          fill={`rgba(12,12,12,${p.o})`}/>
      ))}
    </svg>
  );
};

/* Halftone dot pattern */
const Halftone = ({ width, height }) => {
  const rows = Math.floor(height / 10);
  const cols = Math.floor(width / 10);
  return (
    <svg width={width} height={height} className="halftone-bg">
      {Array.from({length: rows}, (_,r) =>
        Array.from({length: cols}, (_,c) => {
          const x = c * 10 + 5;
          const y = r * 10 + 5;
          const cx2 = width / 2, cy2 = height / 2;
          const d = Math.hypot(x - cx2, y - cy2);
          const maxD = Math.hypot(cx2, cy2);
          const sz = 0.4 + (d / maxD) * 1.0;
          return <circle key={`${r}-${c}`} cx={x} cy={y} r={sz} fill="rgba(12,12,12,0.25)"/>;
        })
      )}
    </svg>
  );
};
