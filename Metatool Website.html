<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portable Attention Box — Website Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>
<script type="text/babel">

/* ── TOKENS ── */
const T = {
  ink: '#0c0c0c', paper: '#f8f7f5', paper2: '#efeeec',
  gray1: '#d8d6d2', gray2: '#a8a6a1', gray3: '#6b6966',
  mono: "'IBM Plex Mono', monospace", sans: "'IBM Plex Sans', sans-serif",
  grid: 'rgba(12,12,12,0.055)',
};

/* ── SHARED PRIMITIVES ── */

const GridBg = ({ cols = 24, style = {} }) => (
  <div style={{
    position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0,
    backgroundImage: `linear-gradient(${T.grid} 1px, transparent 1px), linear-gradient(90deg, ${T.grid} 1px, transparent 1px)`,
    backgroundSize: `${cols}px ${cols}px`,
    ...style
  }}/>
);

const PointCloud = ({ width, height, density = 80 }) => {
  const pts = React.useMemo(() => {
    const r = [];
    const cx = width * 0.5, cy = height * 0.5;
    for (let i = 0; i < density; i++) {
      const a = Math.random() * Math.PI * 2;
      const rad = Math.pow(Math.random(), 0.6) * Math.min(width, height) * 0.42;
      r.push({ x: cx + Math.cos(a)*rad*(0.6+Math.random()*0.8), y: cy + Math.sin(a)*rad*0.7, s: 0.8+Math.random()*2.5, o: 0.15+Math.random()*0.7 });
    }
    [[0.25,0.38],[0.55,0.3],[0.74,0.52],[0.38,0.65],[0.62,0.68]].forEach(([fx,fy]) => {
      for (let j = 0; j < 14; j++) r.push({ x: fx*width+(Math.random()-.5)*36, y: fy*height+(Math.random()-.5)*28, s: 1+Math.random()*3, o: 0.3+Math.random()*0.65 });
    });
    return r;
  }, [width, height, density]);
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      {Array.from({length:Math.ceil(height/20)},(_,i)=>(
        <line key={`h${i}`} x1={0} y1={i*20} x2={width} y2={i*20} stroke="rgba(12,12,12,0.05)" strokeWidth="0.5"/>
      ))}
      {Array.from({length:Math.ceil(width/20)},(_,i)=>(
        <line key={`v${i}`} x1={i*20} y1={0} x2={i*20} y2={height} stroke="rgba(12,12,12,0.05)" strokeWidth="0.5"/>
      ))}
      {pts.slice(0,50).map((p,i)=>pts.slice(i+1,i+3).map((q,j)=>{
        const d=Math.hypot(q.x-p.x,q.y-p.y);
        return d<60?<line key={`l${i}-${j}`} x1={p.x} y1={p.y} x2={q.x} y2={q.y} stroke="rgba(12,12,12,0.09)" strokeWidth="0.5"/>:null;
      }))}
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={p.s} fill={`rgba(12,12,12,${p.o})`}/>)}
    </svg>
  );
};

const DeskThumb = ({ w, h }) => (
  <svg width={w} height={h} style={{display:'block'}}>
    <rect width={w} height={h} fill="#eae8e4"/>
    {Array.from({length:7},(_,i)=><line key={`h${i}`} x1={0} y1={(i+1)*h/8} x2={w} y2={(i+1)*h/8} stroke="rgba(12,12,12,0.06)" strokeWidth="0.5"/>)}
    {Array.from({length:5},(_,i)=><line key={`v${i}`} x1={(i+1)*w/6} y1={0} x2={(i+1)*w/6} y2={h} stroke="rgba(12,12,12,0.06)" strokeWidth="0.5"/>)}
    <rect x={0} y={h*0.56} width={w} height={h*0.44} fill="#d4d1cb"/>
    <rect x={w*0.22} y={h*0.1} width={w*0.56} height={h*0.34} fill="#c6c3bd" rx="2"/>
    <rect x={w*0.35} y={h*0.44} width={w*0.3} height={h*0.05} fill="#b8b5af"/>
    <rect x={w*0.2} y={h*0.62} width={w*0.48} height={h*0.08} fill="#ccc9c2" rx="1"/>
    <rect x={w*0.73} y={h*0.6} width={w*0.1} height={h*0.15} fill="#b4b1aa" rx="2"/>
    <rect x={w*0.06} y={h*0.58} width={w*0.08} height={h*0.22} fill="#aaa7a0"/>
    <rect x={w*0.1} y={h*0.6} width={w*0.06} height={h*0.2} fill="#b0ada6"/>
  </svg>
);

/* ── SHARED NAV ── */
const SiteNav = ({ active = 'home' }) => {
  const links = ['Home','New Entry','Archive','Recall Mode'];
  return (
    <nav style={{
      height: 52, borderBottom: `1px solid ${T.gray1}`,
      display: 'flex', alignItems: 'center',
      padding: '0 48px', justifyContent: 'space-between',
      background: T.paper, position: 'relative', zIndex: 10, flexShrink: 0,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {/* Logo mark */}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0.5" y="0.5" width="15" height="15" stroke={T.ink} strokeWidth="1"/>
          <line x1="8" y1="0" x2="8" y2="16" stroke={T.ink} strokeWidth="0.5"/>
          <line x1="0" y1="8" x2="16" y2="8" stroke={T.ink} strokeWidth="0.5"/>
          <circle cx="8" cy="8" r="2" fill={T.ink}/>
        </svg>
        <span style={{ fontFamily: T.mono, fontSize: 12, fontWeight: 500, letterSpacing: '0.04em', color: T.ink }}>
          Portable Attention Box
        </span>
      </div>
      <div style={{ display: 'flex', gap: 0 }}>
        {links.map(l => {
          const key = l.toLowerCase().replace(' ', '-');
          const isActive = active === key || (active === 'home' && l === 'Home') || (active === l.toLowerCase().replace(' ','-'));
          return (
            <span key={l} style={{
              padding: '0 16px', height: 52, display: 'flex', alignItems: 'center',
              fontFamily: T.mono, fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase',
              color: isActive ? T.ink : T.gray3,
              borderBottom: isActive ? `2px solid ${T.ink}` : '2px solid transparent',
              cursor: 'pointer',
            }}>{l}</span>
          );
        })}
      </div>
    </nav>
  );
};

/* ── SITE FOOTER ── */
const SiteFooter = () => (
  <footer style={{
    borderTop: `1px solid ${T.gray1}`, padding: '18px 48px',
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    background: T.paper, flexShrink: 0,
  }}>
    <span style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.12em', color: T.gray3, textTransform: 'uppercase' }}>

    <span style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.12em', color: T.gray3 }}>

──────────────────────────────────── */

      </div>

      {/* Right: point cloud */}
      <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.paper2, overflow: 'hidden' }}>
        <GridBg cols={20}/>
        <div style={{ position: 'relative', zIndex: 1 }}>
          <PointCloud width={540} height={580} density={200}/>
          {/* Crosshair */}
          <svg style={{ position: 'absolute', inset: 0 }} width={540} height={580}>
            <line x1={270} y1={0} x2={270} y2={580} stroke="rgba(12,12,12,0.08)" strokeWidth="0.5" strokeDasharray="4,8"/>
            <line x1={0} y1={290} x2={540} y2={290} stroke="rgba(12,12,12,0.08)" strokeWidth="0.5" strokeDasharray="4,8"/>
            <circle cx={270} cy={290} r={6} fill="none" stroke="rgba(12,12,12,0.3)" strokeWidth="1"/>

        </div>
        {/* Corner labels */}
        <div style={{ position: 'absolute', bottom: 16, right: 20, fontFamily: T.mono, fontSize: 8, letterSpacing: '0.12em', color: T.gray3, textTransform: 'uppercase' }}>
          Point Cloud — Session #041
        </div>
        <div style={{ position: 'absolute', top: 16, left: 20, fontFamily: T.mono, fontSize: 8, letterSpacing: '0.12em', color: T.gray3 }}>
          X / Y / Z
        </div>
        {/* Axis ticks */}
        <div style={{ position: 'absolute', bottom: 16, left: 20, display: 'flex', gap: 12 }}>
          {['Density','Focus','Time'].map(a => (
            <span key={a} style={{ fontFamily: T.mono, fontSize: 7, letterSpacing: '0.1em', color: T.gray3, textTransform: 'uppercase' }}>{a}</span>
          ))}
        </div>
      </div>
    </div>

    <SiteFooter/>
  </div>
);

          ))}
        </div>

        {/* Main content */}
        <div style={{ display: 'grid', gridTemplateColumns: '480px 1fr', flex: 1 }}>

            <div>
              <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.gray3, marginBottom: 6 }}>Step 01 — Capture</div>

                  <line x1="0" y1="33%" x2="100%" y2="33%" stroke="rgba(12,12,12,0.1)" strokeWidth="0.5"/>
